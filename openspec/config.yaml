schema: spec-driven
mode: openspec
strict_tdd: true
delivery_strategy: single-pr
context: |
  Tech stack: Python 3.11+, asyncio, pytest, SQLAlchemy, Alembic, LanceDB, aiosqlite
  Architecture: Zero Latency EventBus, Zsh IPC
  Testing: Pytest with strict coverage
  Style: Typed Python (Mypy strict)
testing:
  runner: pytest
  layers: [unit, integration]
  coverage: false
  type_checker: mypy
rules:
  proposal:
    - Include rollback plan for risky changes
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns
    tdd: false
    test_command: "./.venv/bin/pytest tests/unit/"
  verify:
    test_command: "./.venv/bin/pytest tests/unit/"
  archive:
    - Warn before merging destructive deltas
